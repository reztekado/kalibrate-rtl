name: Build kalibrate-rtl Windows x64

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

    tags:
      - 'v*'

  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build kalibrate-rtl
    runs-on: windows-2025

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

          install: >-
            git
            zip
            unzip
            base-devel
            autoconf
            automake
            libtool
            pkgconf
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-fftw
            mingw-w64-ucrt-x86_64-rtl-sdr
            mingw-w64-ucrt-x86_64-libusb

      - name: Show build environment
        run: |
          uname -a
          gcc --version
          pkg-config --modversion fftw3f
          pkg-config --modversion librtlsdr

      - name: Bootstrap autotools
        run: |
          chmod +x bootstrap || true
          ./bootstrap

      - name: Remove unsupported -lrt linkage
        run: |
          find . -type f \( -name "Makefile.am" -o -name "Makefile.in" -o -name "configure.ac" -o -name "configure" \) \
            -exec sed -i 's/-lrt//g' {} +

      - name: Configure
        run: |
          ./configure \
            --prefix=/ucrt64

      - name: Build
        run: |
          make -j$(nproc)

      - name: Strip executable
        run: |
          strip src/kal.exe || true

      - name: Verify runtime dependencies
        run: |
          ldd src/kal.exe || true

      - name: Prepare distribution
        run: |
          mkdir -p dist

          cp src/kal.exe dist/

          # RTL-SDR runtime DLLs
          cp /ucrt64/bin/*rtlsdr*.dll dist/ || true

          # FFTW runtime DLLs
          cp /ucrt64/bin/libfftw3*.dll dist/ || true

          # libusb
          cp /ucrt64/bin/libusb-1.0.dll dist/ || true

          # GCC runtime DLLs
          cp /ucrt64/bin/libgcc_s_seh-1.dll dist/ || true
          cp /ucrt64/bin/libstdc++-6.dll dist/ || true
          cp /ucrt64/bin/libwinpthread-1.dll dist/ || true

      - name: Create README
        run: |
          cat > dist/README.txt << 'EOF'
          kalibrate-rtl Windows x64 build

          Usage examples:

            kal.exe -s GSM850
            kal.exe -s GSM900

          Measure channel:

            kal.exe -c 128

          IMPORTANT:
            Install WinUSB driver using Zadig.

          Zadig:
            https://zadig.akeo.ie/

          Device:
            Bulk-In, Interface 0

          Driver:
            WinUSB
          EOF

      - name: Create ZIP package
        run: |
          cd dist
          zip -9 -r ../kalibrate-rtl-win64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kalibrate-rtl-win64
          path: kalibrate-rtl-win64.zip
          compression-level: 9
          overwrite: true

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: kalibrate-rtl-win64.zip
          generate_release_notes: true
